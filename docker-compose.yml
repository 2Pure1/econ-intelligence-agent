services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AGENT_API_URL=http://localhost:8001
    depends_on:
      - api
    restart: always
